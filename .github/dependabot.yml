# Dependabot: maandelijks één gegroepeerde update-PR (geen PR-lawine) +
# automatische security-updates. Mergen = gewone PR-flow; deploy volgt vanzelf.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      alle-updates:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
