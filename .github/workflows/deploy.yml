name: Deploy to Plesk

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production bundle
        run: npm run build
        env:
          CI: false

      # SFTP i.p.v. FTPS: één SSH-verbinding, geen los passief datakanaal (dat de
      # Plesk-server voor deze vhost afknijpt → ECONNRESET). Eigen sftp-batch die
      # de doelmap eerst aanmaakt (-mkdir negeert 'bestaat al') en dan de build
      # erin zet. Hergebruikt dezelfde FTP_*-secrets (poort 22).
      - name: Deploy build/ via SFTP
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          # SFTP landt in de map die alle domeinmappen bevat → relatief pad
          # gebruiken (leidende én sluitende slash weg).
          DIR="${SFTP_DIR#/}"; DIR="${DIR%/}"
          echo "Doelmap (relatief): $DIR"
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no -P 22 "$SFTP_USER@$SFTP_SERVER" <<SFTPEOF
          -mkdir $DIR
          put -r ./build/* $DIR/
          bye
          SFTPEOF
          echo "== verificatie =="
          echo "ls $DIR/index.html" | sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no -P 22 "$SFTP_USER@$SFTP_SERVER" | tee /tmp/v.txt
          grep -q "index.html" /tmp/v.txt || { echo "!! Upload niet teruggevonden op de server"; exit 1; }
          echo "Upload OK"
