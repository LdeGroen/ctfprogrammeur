<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#9f4493" />
    <meta name="description" content="Café Theater Festival — Voor programmeurs" />
    <meta name="robots" content="noindex,nofollow" />
    <title>CTF Programmeur — Café Theater Festival</title>
    <!-- CTF-foutmelder: meldt onafgevangen JS-fouten aan de backend (ops-push + software-kaart) -->
  <script>/* ctf-foutmelder */(function(){var app='programmeur';if(/^(localhost|127\.)/.test(location.hostname))return;var gezien={};function meld(m,st){try{m=String(m||'').slice(0,500);var k=m.slice(0,120);if(!m||gezien[k])return;gezien[k]=1;fetch('https://backend.cafetheaterfestival.nl/api/ops/client-error',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({app:app,message:m,stack:String(st||'').slice(0,2000),url:location.href.slice(0,300)})}).catch(function(){});}catch(e){}}window.addEventListener('error',function(e){if(e&&e.message)meld(e.message,e.error&&e.error.stack);});window.addEventListener('unhandledrejection',function(e){var r=(e&&e.reason)||{};meld(r.message||String(r),r.stack);});})();</script>
</head>
  <body>
    <noscript>Je moet JavaScript inschakelen om deze pagina te gebruiken.</noscript>
    <div id="root"></div>
  </body>
</html>
